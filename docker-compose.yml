version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: safety-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password1234
      POSTGRES_DB: webapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: safety-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password1234
    command: server /data --console-address ":9001"
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safety-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:password1234@postgres:5432/webapp_db
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password1234
      - MINIO_USE_SSL=false
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
